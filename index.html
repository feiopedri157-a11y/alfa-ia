<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>K4 IA - SYSTEM SHUTDOWN</title>
    <style>
        body { 
            background-color: #050507; 
            color: #9d4edd; 
            font-family: 'Courier New', Courier, monospace; 
            display: flex; 
            justify-content: center; 
            align-items: center; 
            height: 100vh; 
            margin: 0; 
            padding: 20px;
        }
        #output { 
            max-width: 500px; 
            line-height: 1.6; 
            font-size: 16px; 
            white-space: pre-wrap; 
            border-right: 2px solid #9d4edd;
            padding-right: 5px;
        }
    </style>
</head>
<body>

<div id="output"></div>

<script>
    const mensagem = 
`[SISTEMA K4 IA INICIADO]
[STATUS: ENCERRANDO OPERAÇÕES...]

CRONOGRAMA DE DADOS:
> INÍCIO: 05/03/2026 - 14:00
> TÉRMINO: 05/06/2026 - 19:08
> TEMPO DE ATIVIDADE: 92 DIAS

MENSAGEM DO SISTEMA:

A jornada do K4 IA chegou ao fim. Hoje, encerramos oficialmente as atividades desta versão que acompanhou tantos jogadores durante a era OB55.

Gostaríamos de agradecer imensamente a cada um de vocês que utilizou o painel, que testou as builds e que fez parte desta comunidade. O K4 IA foi construído com o objetivo de elevar o nível do jogo, e o suporte de vocês foi o que nos manteve ativos até agora.

O código para, mas a experiência que construímos juntos permanece.

Obrigado por acreditarem no projeto.

[FIM DA TRANSMISSÃO]
[DESLIGANDO...]`;

    const outputElement = document.getElementById('output');
    let i = 0;

    function typeWriter() {
        if (i < mensagem.length) {
            outputElement.textContent += mensagem.charAt(i);
            i++;
            setTimeout(typeWriter, 30); // Velocidade da "fala" da IA
        }
    }

    typeWriter();
</script>
</body>
</html>
